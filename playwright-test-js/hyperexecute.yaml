version: "0.1"

runson: linux

autosplit: true
concurrency: 1

pre:
  - npm install
  - npx playwright install

testDiscovery:
  type: raw
  mode: dynamic
  command: find tests -name "*.spec.js"

testRunnerCommand: "npx playwright test --config=playwright.config.js $test"

retryOnFailure: true
maxRetries: 3

post:
  - rm -f demo.txt