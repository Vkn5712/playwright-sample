version: "0.1"

runson: linux

autosplit: true
concurrency: 1

vars:
  executeOn: lambdatest

pre:
  - npm install

testDiscovery:
  type: raw
  mode: dynamic
  command: find tests -name "*.spec.js"

testRunnerCommand: npx playwright $test
retryOnFailure: true
maxRetries: 3

post:
  - rm -f demo.txt